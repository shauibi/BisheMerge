<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:30px;font-weight:700;fill:#111827}
      .boundary{fill:#f8fafc;stroke:#334155;stroke-width:2.5;rx:20;ry:20}
      .case{fill:#eff6ff;stroke:#2563eb;stroke-width:2.2}
      .case2{fill:#f0fdf4;stroke:#16a34a;stroke-width:2.2}
      .case3{fill:#fff7ed;stroke:#ea580c;stroke-width:2.2}
      .text{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:18px;fill:#111827}
      .small{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:15px;fill:#475569}
      .line{stroke:#475569;stroke-width:2;fill:none}
      .actor{stroke:#111827;stroke-width:2.5;fill:none}
    </style>
  </defs>
  <text x="600" y="48" text-anchor="middle" class="title">图4-1 系统用例图</text>
  <rect x="260" y="85" width="850" height="610" class="boundary"/>
  <text x="685" y="122" text-anchor="middle" class="text">端侧 LLM 应用系统</text>

  <circle cx="125" cy="205" r="28" class="actor"/>
  <line x1="125" y1="233" x2="125" y2="330" class="actor"/>
  <line x1="75" y1="270" x2="175" y2="270" class="actor"/>
  <line x1="125" y1="330" x2="82" y2="405" class="actor"/>
  <line x1="125" y1="330" x2="168" y2="405" class="actor"/>
  <text x="125" y="455" text-anchor="middle" class="text">普通用户</text>

  <ellipse cx="470" cy="180" rx="130" ry="44" class="case"/>
  <text x="470" y="186" text-anchor="middle" class="text">进行LLM对话</text>
  <ellipse cx="800" cy="180" rx="130" ry="44" class="case"/>
  <text x="800" y="186" text-anchor="middle" class="text">管理会话记录</text>

  <ellipse cx="470" cy="295" rx="130" ry="44" class="case2"/>
  <text x="470" y="301" text-anchor="middle" class="text">导入知识库文档</text>
  <ellipse cx="800" cy="295" rx="130" ry="44" class="case2"/>
  <text x="800" y="301" text-anchor="middle" class="text">开启RAG检索</text>

  <ellipse cx="470" cy="410" rx="130" ry="44" class="case3"/>
  <text x="470" y="416" text-anchor="middle" class="text">语音输入问题</text>
  <ellipse cx="800" cy="410" rx="130" ry="44" class="case3"/>
  <text x="800" y="416" text-anchor="middle" class="text">管理模型路径</text>

  <ellipse cx="470" cy="525" rx="130" ry="44" class="case"/>
  <text x="470" y="531" text-anchor="middle" class="text">使用提示词模板</text>
  <ellipse cx="800" cy="525" rx="130" ry="44" class="case"/>
  <text x="800" y="531" text-anchor="middle" class="text">查看推理状态</text>

  <line x1="180" y1="270" x2="340" y2="180" class="line"/>
  <line x1="180" y1="280" x2="670" y2="180" class="line"/>
  <line x1="180" y1="295" x2="340" y2="295" class="line"/>
  <line x1="180" y1="310" x2="670" y2="295" class="line"/>
  <line x1="180" y1="325" x2="340" y2="410" class="line"/>
  <line x1="180" y1="340" x2="670" y2="410" class="line"/>
  <line x1="180" y1="355" x2="340" y2="525" class="line"/>
  <line x1="180" y1="370" x2="670" y2="525" class="line"/>

  <text x="685" y="640" text-anchor="middle" class="small">系统为纯端侧应用，不设置注册登录角色；用户通过本地界面完成模型、对话、知识库与语音交互操作。</text>
</svg>
