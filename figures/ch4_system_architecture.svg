      .label{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:18px;font-weight:700;fill:#0f172a}
      .arrow{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arr4)}
